services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: iconimage
      POSTGRES_PASSWORD: iconimage
      POSTGRES_DB: iconimage
    ports:
      - '5432:5432'
    volumes:
      - iconimage_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U iconimage']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    profiles: ['local-s3']
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - iconimage_minio:/data

  api:
    build: .
    profiles: ['full']
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://iconimage:iconimage@postgres:5432/iconimage?schema=public
    ports:
      - '4000:4000'

volumes:
  iconimage_pg:
  iconimage_minio:

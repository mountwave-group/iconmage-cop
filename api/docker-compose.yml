services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: iconimage
      POSTGRES_PASSWORD: iconimage
      POSTGRES_DB: iconimage
    ports:
      - '5432:5432'
    volumes:
      - iconimage_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U iconimage']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    profiles: ['local-s3']
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - iconimage_minio:/data

  api:
    build: .
    profiles: ['full']
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://iconimage:iconimage@postgres:5432/iconimage?schema=public
    # Production traffic flows through nginx (443). 4000 is also published for
    # local development tooling (Swagger UI, curl, integration tests).
    ports:
      - '4000:4000'

  nginx:
    image: nginx:1.27-alpine
    profiles: ['full']
    depends_on:
      - api
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_certs:/etc/nginx/certs
    # Generate a self-signed cert on first start if it doesn't exist yet.
    command:
      - sh
      - -c
      - |
        if [ ! -f /etc/nginx/certs/cert.pem ]; then
          apk add --no-cache openssl && \
          openssl req -x509 -nodes -days 3650 -newkey rsa:2048 \
            -keyout /etc/nginx/certs/key.pem \
            -out    /etc/nginx/certs/cert.pem \
            -subj   '/CN=iconimage-api/O=ICON IMAGE/C=MC';
        fi && \
        nginx -g 'daemon off;'
    restart: unless-stopped

volumes:
  iconimage_pg:
  iconimage_minio:
  nginx_certs:

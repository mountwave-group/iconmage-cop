name: deploy-api

on:
  push:
    branches: [main]
    paths:
      - 'api/**'
      - 'infra/**'
      - '.github/workflows/deploy-api.yml'
  workflow_dispatch:

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2
  AWS_ACCOUNT_ID: '585008043730'
  ECR_REPOSITORY: iconimage/api
  ECS_CLUSTER: iconimage
  MIGRATION_TASK_DEF: iconimage-migration

jobs:
  api-checks:
    name: API · lint + test + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npm test -- --passWithNoTests
      - run: npm run build

  deploy:
    name: Build · push · deploy
    needs: api-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/iconimage-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push API image
        env:
          IMAGE_TAG: ${{ github.sha }}
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build -t "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" -t "$REGISTRY/$ECR_REPOSITORY:latest" ./api
          docker push "$REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$REGISTRY/$ECR_REPOSITORY:latest"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: infra/package-lock.json

      - name: Install infra deps
        working-directory: infra
        run: npm ci

      - name: Install API deps (CDK bundles them)
        working-directory: api
        run: npm ci

      - name: CDK deploy
        working-directory: infra
        env:
          CDK_DEFAULT_ACCOUNT: ${{ env.AWS_ACCOUNT_ID }}
          CDK_DEFAULT_REGION: ${{ env.AWS_REGION }}
        run: npx cdk deploy --all --require-approval never

      - name: Run Prisma migrations
        run: |
          SUBNETS=$(aws cloudformation describe-stacks \
            --stack-name MigrationStack \
            --query "Stacks[0].Outputs[?OutputKey=='MigrationSubnetIds'].OutputValue" \
            --output text)
          SG=$(aws cloudformation describe-stacks \
            --stack-name MigrationStack \
            --query "Stacks[0].Outputs[?OutputKey=='MigrationSecurityGroupId'].OutputValue" \
            --output text)
          aws ecs run-task \
            --cluster "$ECS_CLUSTER" \
            --launch-type FARGATE \
            --task-definition "$MIGRATION_TASK_DEF" \
            --network-configuration "awsvpcConfiguration={subnets=[${SUBNETS//,/ ,}],securityGroups=[$SG],assignPublicIp=ENABLED}" \
            --started-by "gha-${{ github.run_id }}"

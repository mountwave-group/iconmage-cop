name: deploy-web

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'scripts/release.sh'
      - 'send-release-phase2.js'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:
    inputs:
      skip-announce:
        description: 'Skip Telegram announcement (1=skip, 0=send)'
        required: false
        default: '1'
        type: choice
        options: ['1', '0']

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: eu-west-2
  AWS_ACCOUNT_ID: '585008043730'
  AMPLIFY_APP_ID: d8xxo1v3caqik
  AMPLIFY_ENV: dev
  CF_DISTRIBUTION_ID: E11QT6WLU0YJR5

jobs:
  release:
    name: Web · build · publish · announce
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/iconimage-github-actions
          aws-region: ${{ env.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Install Amplify CLI
        run: npm i -g @aws-amplify/cli@latest

      - name: Pull Amplify backend (non-interactive)
        working-directory: web
        env:
          AMPLIFY_APP_ID: ${{ env.AMPLIFY_APP_ID }}
          AMPLIFY_ENV: ${{ env.AMPLIFY_ENV }}
          AWS_REGION: ${{ env.AWS_REGION }}
        run: |
          AMPLIFY_INIT=$(jq -nc \
            --arg appId "$AMPLIFY_APP_ID" \
            --arg envName "$AMPLIFY_ENV" \
            '{appId:$appId, envName:$envName, defaultEditor:"code"}')
          AMPLIFY_PROVIDERS=$(jq -nc \
            --arg region "$AWS_REGION" \
            '{awscloudformation:{configLevel:"project",useProfile:false,region:$region}}')
          amplify pull \
            --amplify "$AMPLIFY_INIT" \
            --providers "$AMPLIFY_PROVIDERS" \
            --frontend '{"frontend":"javascript","framework":"react","config":{"SourceDir":"src","DistributionDir":"dist","BuildCommand":"npm run build","StartCommand":"npm run dev"}}' \
            --yes

      - name: Run release.sh
        env:
          CI: 'true'
          CF_DISTRIBUTION_ID: ${{ env.CF_DISTRIBUTION_ID }}
          SKIP_ANNOUNCE: ${{ github.event_name == 'workflow_dispatch' && inputs.skip-announce || '1' }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: bash scripts/release.sh

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=5"
    />
    <meta name="theme-color" content="#0F0F0F" />
    <meta name="color-scheme" content="dark" />
    <meta name="description" content="ICON IMAGE — Corporate Operating Platform. Private digital headquarters." />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ICON IMAGE" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="ICON IMAGE — Corporate Operating Platform" />
    <meta property="og:type" content="website" />
    <meta property="og:description" content="Private digital headquarters for ICON IMAGE Group." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap"
    />
    <title>ICON IMAGE — Private</title>
    <script>
      // Apply persisted theme before React mounts to prevent flash.
      (function () {
        try {
          var stored = localStorage.getItem('iconimage.theme.v1');
          var mode = stored === 'light' || stored === 'dark' || stored === 'system' ? stored : 'dark';
          var resolved =
            mode === 'system'
              ? (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark')
              : mode;
          document.documentElement.setAttribute('data-theme', resolved);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
